<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>產生 Icon</title></head>
<body>
<p>自動產生中，請稍候...</p>
<canvas id="c"></canvas>
<script>
const svg = `<svg width="512" height="512" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)"/>
  <rect width="64" height="28" rx="16" fill="url(#shineGrad)"/>
  <path d="M10 46 L10 20 Q10 17 13 17 L28 17 L28 46 Z" fill="white" fill-opacity="0.9"/>
  <path d="M54 46 L54 20 Q54 17 51 17 L36 17 L36 46 Z" fill="white" fill-opacity="0.9"/>
  <rect x="28" y="17" width="8" height="29" fill="url(#bgGrad)"/>
  <rect x="9" y="45" width="46" height="3" rx="1.5" fill="white" fill-opacity="0.6"/>
  <rect x="14" y="24" width="10" height="2" rx="1" fill="white" fill-opacity="0.55"/>
  <rect x="14" y="29" width="10" height="2" rx="1" fill="white" fill-opacity="0.45"/>
  <rect x="14" y="34" width="7"  height="2" rx="1" fill="white" fill-opacity="0.35"/>
  <rect x="40" y="24" width="10" height="2" rx="1" fill="white" fill-opacity="0.55"/>
  <rect x="40" y="29" width="10" height="2" rx="1" fill="white" fill-opacity="0.45"/>
  <rect x="40" y="34" width="7"  height="2" rx="1" fill="white" fill-opacity="0.35"/>
  <path d="M51 10 L52 13 L55 13 L52.7 15 L53.6 18 L51 16.2 L48.4 18 L49.3 15 L47 13 L50 13 Z"
        fill="white" fill-opacity="0.95"/>
</svg>`;

const sizes = [180, 192, 512];
const blob = new Blob([svg], {type: 'image/svg+xml'});
const url  = URL.createObjectURL(blob);
const img  = new Image();

img.onload = () => {
    sizes.forEach(size => {
        const c = document.createElement('canvas');
        c.width = c.height = size;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        const a = document.createElement('a');
        a.download = `icon-${size}.png`;
        a.href = c.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
    });
    document.querySelector('p').textContent = '✅ 已下載 3 個 icon 檔案（icon-180.png、icon-192.png、icon-512.png），把它們放到 toeic-vocab-master 資料夾即可。';
    URL.revokeObjectURL(url);
};
img.src = url;
</script>
</body>
</html>

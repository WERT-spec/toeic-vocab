<!DOCTYPE html>
<html lang="zh-TW" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
    <title>TOEIC 30天單字集 - Yuntech 電子系專屬</title>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] min-h-screen pb-24 transition-colors">

    <div id="app" class="max-w-md mx-auto px-4 pt-8">
        <!-- Header -->
        <header class="mb-4 relative text-center">
            <button onclick="toggleDarkMode()" id="dark-mode-btn" title="切換深色模式" class="absolute right-0 top-0 w-10 h-10 flex items-center justify-center rounded-full bg-white border border-slate-200 shadow-sm hover:bg-slate-50 transition-all text-lg">🌙</button>
<h1 id="app-title" class="text-2xl font-bold text-slate-800 text-center tracking-tight">TOEIC 30天單字訓練</h1>
            <div class="mt-2 flex items-center justify-center gap-2">
                <button onclick="toggleDaySelector()" id="current-day-title" class="px-5 py-1.5 rounded-full border border-indigo-400 text-indigo-500 font-bold text-sm tracking-widest uppercase hover:bg-indigo-50 transition-all">
                    <span id="day-label">DAY 01</span>
                </button>
                <button onclick="toggleGlobalRangeSelector()" id="global-range-btn" title="切換顯示範圍" class="w-9 h-9 flex items-center justify-center rounded-full border border-slate-200 bg-white text-slate-400 shadow-sm hover:text-indigo-600 hover:border-indigo-200 hover:bg-indigo-50 transition-all active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12" /></svg>
                </button>
            </div>

            <!-- Global Range Selector (Hidden by default) -->
            <div id="global-range-selector-container" class="hidden mt-4 bg-white rounded-xl shadow-md border border-indigo-100 p-3 animate-in fade-in slide-in-from-top-2 duration-200">
                <div class="flex flex-wrap gap-2 justify-center" id="global-range-selector"></div>
            </div>
        </header>

        <!-- Day Selector -->
        <div class="mb-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="dropdown-content" id="day-selector-dropdown">
                    <div class="dropdown-inner">
                        <div class="p-3 grid grid-cols-5 gap-2 border-t border-slate-100" id="day-grid"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Tabs -->
        

        <!-- Section: List -->
        <div id="section-list" class="space-y-3 animate-in fade-in slide-in-from-bottom-2 duration-300">
            <div class="bg-white dark:bg-[#0B1120] rounded-xl shadow-sm overflow-hidden border border-slate-100 dark:border-slate-800/60">
                <table class="w-full text-left border-collapse table-fixed">
                    <thead class="bg-slate-50 dark:bg-[#0B1120] text-slate-500 dark:text-slate-400 text-[10px] sm:text-[11px] font-bold border-b border-slate-100 dark:border-slate-800/60 hidden sm:table-header-group">
                        <tr>
                            <th class="py-4 w-10 sm:w-16 text-center tracking-widest pl-2">#</th>
                            <th class="py-4 w-[50%] sm:w-[45%] tracking-widest pl-2">單字與發音</th>
                            <th class="py-4 w-[40%] sm:w-auto tracking-widest pr-2 text-left">詞性與中文意思</th>
                        </tr>
                    </thead>
                    <tbody id="vocab-table-body" class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <!-- Section: Flashcards -->
        <div id="section-cards" class="hidden animate-in fade-in slide-in-from-bottom-2 duration-300">
            <!-- 字卡區域 -->
            <div id="card-area" class="hidden">
                <div class="card-flip w-full h-72 mb-6">
                    <div id="flashcard-inner" class="card-inner relative w-full h-full" onclick="handleCardClick(event)">
                        <div class="card-front bg-white rounded-2xl shadow-md border border-slate-200 flex flex-col items-center justify-center p-6 text-center">
                            <h2 id="card-word" class="text-4xl font-bold text-slate-800 mb-4 tracking-tight text-center px-2 break-all">word</h2>
                            <div class="flex flex-row items-center gap-3">
                                <!-- Flashcard Audio Button -->
                                <button id="card-audio-btn" onclick="playVocabAudio('card', this, event)" class="w-12 h-12 flex items-center justify-center bg-slate-50 rounded-full text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all border border-slate-200 shadow-sm active:scale-95">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                                </button>
                                <div class="bg-indigo-50 px-4 py-1.5 rounded-full border border-indigo-100">
                                    <span id="card-info" class="text-indigo-600 font-medium text-xs italic"></span>
                                </div>
                            </div>
                            <p class="text-slate-300 text-[10px] mt-6 uppercase tracking-widest font-bold">點擊卡片空白處翻面</p>
                        </div>
                        <div class="card-back bg-indigo-600 rounded-2xl shadow-md flex flex-col items-center justify-center p-6 text-center text-white">
                            <h2 id="card-meaning" class="text-3xl font-bold px-4 leading-snug">解釋內容</h2>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center px-4">
                    <button onclick="prevCard()" class="p-4 bg-white rounded-full shadow-sm border border-slate-200 active:scale-95 transition-transform"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
                    <span id="card-progress" class="text-slate-500 font-bold text-base tracking-widest bg-slate-100 px-4 py-1 rounded-full">0 / 0</span>
                    <button onclick="nextCard()" class="p-4 bg-white rounded-full shadow-sm border border-slate-200 active:scale-95 transition-transform"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button>
                </div>
            </div>
        </div>

        <!-- Section: Quiz -->
        <div id="section-quiz" class="hidden animate-in fade-in slide-in-from-bottom-2 duration-300">
            <div id="quiz-main-area" class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-100 min-h-[340px] flex flex-col relative">
                <div class="flex justify-between items-center mb-6 border-b border-slate-50 pb-3">
                    <span id="quiz-progress" class="text-sm font-bold text-indigo-600 tracking-wider bg-indigo-50 px-3 py-1 rounded-md">第 0 / 0 題</span>
                    <div class="flex items-center gap-3">
                        <button onclick="cycleQuizMode()" id="quiz-mode-btn" title="切換模式：選擇題" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-indigo-600 hover:bg-indigo-100 hover:scale-110 active:scale-95 transition-all shadow-sm">
                            <svg id="quiz-mode-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                        </button>
                        <span id="quiz-score" class="text-sm font-bold text-green-600 tracking-wider bg-green-50 px-3 py-1 rounded-md flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-green-500 flex-shrink-0"></span>得分: 0</span>
                    </div>
                </div>

                <div id="quiz-content" class="flex-1 flex flex-col">
                    <div class="flex items-start justify-between gap-4 mb-6">
                        <h3 id="quiz-question" class="text-xl font-bold text-slate-800 leading-tight">載入中...</h3>
                        <!-- Quiz Audio Button -->
                        <button id="quiz-audio-btn" onclick="playVocabAudio('quiz', this, event)" class="flex-shrink-0 w-12 h-12 flex items-center justify-center bg-slate-50 border border-slate-100 text-slate-400 rounded-full hover:text-indigo-600 hover:bg-indigo-50 transition-all active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                        </button>
                    </div>
                    <div id="quiz-options" class="space-y-3 hidden flex-1"></div>
                    <div id="quiz-typing" class="hidden flex-1">
                        <!-- Letter tiles -->
                        <div id="typing-tiles" class="flex flex-wrap justify-center gap-1.5 mb-5 min-h-[52px]"></div>
                        <!-- Input -->
                        <input type="text" id="typing-input" autocomplete="off" spellcheck="false" placeholder="輸入英文單字後按 Enter…" class="w-full p-4 border-2 border-slate-200 rounded-xl mb-3 font-bold text-lg text-slate-700 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all text-center tracking-widest">
                        <div class="flex gap-2">
                            <button onclick="giveHint()" id="hint-btn" class="w-full py-4 bg-amber-50 text-amber-600 border-2 border-amber-200 rounded-xl font-bold text-sm hover:bg-amber-100 active:scale-95 transition-all whitespace-nowrap">💡 提示 <span id="hint-cost" class="text-amber-400 text-xs font-normal">(-5分)</span></button>
                        </div>
                    </div>
                    <div id="quiz-feedback" class="mt-4 hidden p-4 rounded-xl text-base font-medium leading-relaxed border"></div>
                </div>

                <div id="quiz-result" class="hidden text-center py-6 flex-1 flex flex-col justify-center items-center">
                    <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                    <p id="result-day-label" class="text-slate-500 mb-1 font-bold"></p>
                    <div id="result-score-display" class="text-7xl font-black text-indigo-600 mb-8"></div>
                    <button onclick="showQuizSetup()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold text-lg shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">再測驗一次</button>
                </div>
            </div>
            <button id="next-quiz-btn" onclick="startQuiz()" class="hidden w-full py-4 bg-indigo-600 text-white rounded-xl font-bold text-lg shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">下一題 ➔</button>
        </div>
    </div>

    
    <!-- Bottom Navigation Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-[#1e293b]/90 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 pb-safe z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex justify-around items-center p-2 h-16">
            <button onclick="switchTab('list')" id="tab-list" class="nav-btn flex flex-col items-center justify-center w-full h-full text-indigo-600 dark:text-indigo-400 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                <span class="text-[10px] font-bold tracking-widest">列表</span>
            </button>
            <button onclick="switchTab('cards')" id="tab-cards" class="nav-btn flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                <span class="text-[10px] font-bold tracking-widest">卡片</span>
            </button>
            <button onclick="switchTab('quiz')" id="tab-quiz" class="nav-btn flex flex-col items-center justify-center w-full h-full text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
                <span class="text-[10px] font-bold tracking-widest">測驗</span>
            </button>
        </div>
    </div>


    <script src="js/vocab.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
